name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./... -v -race

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build all targets (GoReleaser snapshot)
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: build --snapshot --clean

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t grpc-mcp-server .

  report-status:
    runs-on: ubuntu-latest
    needs: [test, lint, build, build-docker]
    if: always() && github.event_name == 'workflow_dispatch'
    steps:
      - name: Report job statuses to commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TEST_RESULT: ${{ needs.test.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          BUILD_DOCKER_RESULT: ${{ needs.build-docker.result }}
        run: |
          report_status() {
            local context="$1" result="$2"
            local state="failure"
            if [ "$result" = "success" ]; then state="success"; fi
            gh api "repos/${{ github.repository }}/statuses/$SHA" \
              -f state="$state" \
              -f context="$context" \
              -f description="CI $context ($result)" \
              -f target_url="$RUN_URL"
          }
          report_status "test" "$TEST_RESULT"
          report_status "lint" "$LINT_RESULT"
          report_status "build" "$BUILD_RESULT"
          report_status "build-docker" "$BUILD_DOCKER_RESULT"
