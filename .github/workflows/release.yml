name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  tag:
    name: Auto Tag
    needs: test
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: master
          tag_prefix: v

  build:
    name: Build
    needs: tag
    if: needs.tag.outputs.new_tag != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
            suffix: ''
          - goos: linux
            goarch: arm64
            suffix: ''
          - goos: linux
            goarch: '386'
            suffix: ''
          # macOS
          - goos: darwin
            goarch: amd64
            suffix: ''
          - goos: darwin
            goarch: arm64
            suffix: ''
          # Windows
          - goos: windows
            goarch: amd64
            suffix: '.exe'
          - goos: windows
            goarch: arm64
            suffix: '.exe'
          - goos: windows
            goarch: '386'
            suffix: '.exe'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${{ needs.tag.outputs.new_tag }}
          COMMIT=${{ github.sha }}
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          go build -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" \
            -o grpc-mcp-server-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }} \
            ./cmd/grpc-mcp-server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grpc-mcp-server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: grpc-mcp-server-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}

  release:
    name: Release
    needs: [tag, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release

          # Move and compress binaries
          for dir in artifacts/grpc-mcp-server-*/; do
            if [ -d "$dir" ]; then
              binary=$(ls "$dir")
              cp "$dir/$binary" release/

              # Create checksums
              cd release
              sha256sum "$binary" >> checksums.txt
              cd ..

              # Create tar.gz for unix, zip for windows
              if [[ "$binary" == *.exe ]]; then
                cd release && zip "${binary%.exe}.zip" "$binary" && rm "$binary" && cd ..
              else
                cd release && tar -czvf "${binary}.tar.gz" "$binary" && rm "$binary" && cd ..
              fi
            fi
          done

          # Add config example
          cp config.example.yaml release/

          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          name: Release ${{ needs.tag.outputs.new_tag }}
          body: |
            ## What's Changed
            ${{ needs.tag.outputs.changelog }}

            ## Installation

            ### Download Binary
            Download the appropriate binary for your platform from the assets below.

            ### Verify Checksum
            ```bash
            sha256sum -c checksums.txt
            ```

            ### Quick Start
            ```bash
            # Extract (Linux/macOS)
            tar -xzf grpc-mcp-server-<os>-<arch>.tar.gz

            # Extract (Windows)
            unzip grpc-mcp-server-windows-<arch>.zip

            # Run
            ./grpc-mcp-server --config config.example.yaml
            ```
          files: |
            release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
