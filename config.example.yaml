# grpc-mcp.yaml - Example configuration

server:
  name: "grpc-mcp"
  version: "1.0.0"
  transport: "stdio"  # or "sse"
  # address: ":8080"  # Required for SSE transport

endpoints:
  # Plaintext (development)
  - name: "local-api"
    address: "localhost:50051"
    auth:
      type: "none"
    tls:
      enabled: false
    exclude:
      - "grpc.reflection.*"
      - "grpc.health.*"
    healthCheck:
      enabled: true
      interval: 30s

